name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12.10"
          enable-cache: true
      - run: uv sync --all-groups --frozen
      - run: uv run pytest -v
      - run: uv run ruff check src tests launcher.py
      - run: uv run mypy src
      - run: uv run magical-girl-glow-down --simulate --cycles 1 --idle-seconds 0.1
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - run: dotnet test helper/MagicalGirlGlowDown.GigabyteHelper.Tests -c Release -v minimal
      - shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-helper.ps1 -SelfContained
      - run: uv build
      - shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\verify-wheel-helper.ps1
